name: Build and Release PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Pandoc and XeLaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-fonts-extra

      - name: Build PDF with Pandoc
        run: |
          pandoc metadata.yaml \
            docs/01-introduction.md \
            docs/02-content.md \
            docs/03-conclusion.md \
            docs/04-advanced.md \
            --pdf-engine=xelatex \
            --citeproc \
            -o document.pdf

      - name: Compute version tag
        id: version
        run: echo "VERSION=v1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.VERSION }}"
          git push origin "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            Automated PDF release generated by GitHub Actions.

            **Version:** ${{ steps.version.outputs.VERSION }}
            **Commit:** ${{ github.sha }}

            ### Contents
            - `document.pdf` — compiled from `docs/01-introduction.md`, `docs/02-content.md`, `docs/03-conclusion.md`, and `docs/04-advanced.md` using Pandoc + XeLaTeX.
          files: document.pdf
